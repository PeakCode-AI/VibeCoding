<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e3a8a"/>
      <stop offset="55%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="logoG" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#93c5fd"/>
      <stop offset="100%" stop-color="#fff"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.04"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- 装饰圆点 -->
  <g fill="#fff" opacity="0.08">
    <circle cx="100" cy="540" r="120"/>
    <circle cx="1100" cy="90" r="160"/>
  </g>

  <!-- Logo -->
  <rect x="80" y="72" width="64" height="64" rx="14" fill="url(#logoG)" opacity="0.95"/>
  <path d="M98 86 H110 L116 110 L122 86 H134 L124 116 H116 L106 86 H98 Z" fill="#1e3a8a" transform="translate(0,8) scale(1)"/>
  <path d="M98 86 H110 L116 110 L122 86 H134 L124 116 H116 L106 86 Z" fill="#2563eb"/>
  <text x="160" y="110" font-family="system-ui, -apple-system, sans-serif" font-size="30" font-weight="700" fill="#fff">VibeBase</text>

  <!-- 主标题 -->
  <text x="80" y="280" font-family="system-ui, -apple-system, sans-serif" font-size="62" font-weight="800" fill="#fff">能收钱、能运营的</text>
  <text x="80" y="360" font-family="system-ui, -apple-system, sans-serif" font-size="62" font-weight="800" fill="#fff">AI 产品平台</text>

  <!-- 副标题 -->
  <text x="80" y="420" font-family="system-ui, -apple-system, sans-serif" font-size="26" fill="#bfdbfe">一次买断 · 源码交付 · 可私有化部署</text>

  <!-- 三个卖点卡片 -->
  <g>
    <rect x="80" y="470" width="330" height="100" rx="14" fill="url(#card)" stroke="#fff" stroke-opacity="0.18"/>
    <text x="110" y="510" font-family="system-ui" font-size="34" font-weight="700" fill="#93c5fd">70+</text>
    <text x="110" y="545" font-family="system-ui" font-size="18" fill="#dbeafe">页完整文档</text>

    <rect x="435" y="470" width="330" height="100" rx="14" fill="url(#card)" stroke="#fff" stroke-opacity="0.18"/>
    <text x="465" y="510" font-family="system-ui" font-size="34" font-weight="700" fill="#93c5fd">4 端</text>
    <text x="465" y="545" font-family="system-ui" font-size="18" fill="#dbeafe">Web/后台/App/小程序</text>

    <rect x="790" y="470" width="330" height="100" rx="14" fill="url(#card)" stroke="#fff" stroke-opacity="0.18"/>
    <text x="820" y="510" font-family="system-ui" font-size="34" font-weight="700" fill="#93c5fd">60+</text>
    <text x="820" y="545" font-family="system-ui" font-size="18" fill="#dbeafe">API 接口</text>
  </g>
</svg>
