<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 320" width="480" height="320">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#eff6ff"/>
      <stop offset="100%" stop-color="#dbeafe"/>
    </linearGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.1"/>
    </filter>
  </defs>

  <rect width="480" height="320" rx="16" fill="url(#bg)"/>

  <!-- 顶部四个客户端 -->
  <g filter="url(#shadow)">
    <!-- Web -->
    <rect x="60" y="36" width="88" height="52" rx="8" fill="#fff" stroke="#bfdbfe"/>
    <rect x="74" y="50" width="60" height="6" rx="3" fill="#60a5fa"/>
    <rect x="74" y="62" width="44" height="5" rx="2.5" fill="#cbd5e1"/>
    <text x="104" y="80" font-family="system-ui" font-size="9" fill="#64748b" text-anchor="middle">用户 Web</text>

    <!-- Admin -->
    <rect x="168" y="36" width="88" height="52" rx="8" fill="#fff" stroke="#bfdbfe"/>
    <rect x="182" y="50" width="22" height="22" rx="4" fill="#818cf8"/>
    <rect x="210" y="52" width="36" height="5" rx="2.5" fill="#cbd5e1"/>
    <rect x="210" y="62" width="28" height="5" rx="2.5" fill="#e2e8f0"/>
    <text x="212" y="80" font-family="system-ui" font-size="9" fill="#64748b" text-anchor="middle">运营后台</text>

    <!-- App -->
    <rect x="276" y="36" width="88" height="52" rx="8" fill="#fff" stroke="#bfdbfe"/>
    <rect x="312" y="48" width="16" height="24" rx="3" fill="none" stroke="#10b981" stroke-width="1.5"/>
    <circle cx="320" cy="68" r="1.5" fill="#10b981"/>
    <text x="320" y="80" font-family="system-ui" font-size="9" fill="#64748b" text-anchor="middle">移动 App</text>

    <!-- 小程序 -->
    <rect x="384" y="36" width="70" height="52" rx="8" fill="#fff" stroke="#bfdbfe"/>
    <ellipse cx="419" cy="56" rx="9" ry="7" fill="none" stroke="#f59e0b" stroke-width="1.5"/>
    <ellipse cx="416" cy="56" rx="4" ry="7" fill="none" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="419" y="80" font-family="system-ui" font-size="9" fill="#64748b" text-anchor="middle">小程序/H5</text>
  </g>

  <!-- 连线到中心 -->
  <g stroke="#93c5fd" stroke-width="1.5" stroke-dasharray="4 3" fill="none">
    <path d="M104 92 L240 140"/>
    <path d="M212 92 L240 140"/>
    <path d="M320 92 L240 140"/>
    <path d="M419 92 L240 140"/>
  </g>

  <!-- 中心：统一 API -->
  <g filter="url(#shadow)">
    <rect x="160" y="134" width="160" height="48" rx="10" fill="url(#brand)"/>
    <text x="240" y="156" font-family="system-ui" font-size="13" font-weight="700" fill="#fff" text-anchor="middle">统一 API 网关</text>
    <text x="240" y="172" font-family="system-ui" font-size="9" fill="#dbeafe" text-anchor="middle">FastAPI · JWT · 限流</text>
  </g>

  <!-- 连线到数据库 -->
  <g stroke="#93c5fd" stroke-width="1.5" stroke-dasharray="4 3" fill="none">
    <path d="M200 186 L150 230"/>
    <path d="M280 186 L330 230"/>
  </g>

  <!-- 底部：数据库 + Redis -->
  <g filter="url(#shadow)">
    <!-- PostgreSQL -->
    <rect x="86" y="226" width="128" height="56" rx="10" fill="#fff" stroke="#bfdbfe"/>
    <ellipse cx="110" cy="248" rx="13" ry="4.5" fill="none" stroke="#3b82f6" stroke-width="1.5"/>
    <path d="M97 248 L97 268 Q97 272.5 110 272.5 Q123 272.5 123 268 L123 248" fill="none" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="150" y="250" font-family="system-ui" font-size="11" font-weight="600" fill="#1e293b">PostgreSQL</text>
    <text x="150" y="264" font-family="system-ui" font-size="8" fill="#64748b">20+ 张共享表</text>

    <!-- Redis -->
    <rect x="266" y="226" width="128" height="56" rx="10" fill="#fff" stroke="#bfdbfe"/>
    <rect x="286" y="242" width="20" height="26" rx="3" fill="none" stroke="#dc2626" stroke-width="1.5"/>
    <line x1="290" y1="250" x2="302" y2="250" stroke="#dc2626" stroke-width="1.5"/>
    <line x1="290" y1="256" x2="302" y2="256" stroke="#dc2626" stroke-width="1.5"/>
    <line x1="290" y1="262" x2="302" y2="262" stroke="#dc2626" stroke-width="1.5"/>
    <text x="330" y="250" font-family="system-ui" font-size="11" font-weight="600" fill="#1e293b">Redis</text>
    <text x="330" y="264" font-family="system-ui" font-size="8" fill="#64748b">限流 · Token 黑名单</text>
  </g>
</svg>
