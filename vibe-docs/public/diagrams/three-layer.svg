<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 380" width="480" height="380">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#eff6ff"/>
      <stop offset="100%" stop-color="#dbeafe"/>
    </linearGradient>
    <linearGradient id="router" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="service" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="dao" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.1"/>
    </filter>
    <marker id="arrowDown" markerWidth="8" markerHeight="8" refX="4" refY="6" orient="auto">
      <path d="M1,1 L4,6 L7,1" fill="none" stroke="#93c5fd" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect width="480" height="380" rx="16" fill="url(#bg)"/>

  <!-- Title -->
  <text x="240" y="32" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="700" fill="#1e293b" text-anchor="middle">后端三层架构</text>
  <text x="240" y="50" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#64748b" text-anchor="middle">Router · Service · DAO 单向调用，职责清晰</text>

  <!-- Side note (UnifiedResponseModel) -->
  <g filter="url(#shadow)">
    <rect x="344" y="68" width="120" height="48" rx="8" fill="#fff" stroke="#bfdbfe"/>
    <rect x="344" y="68" width="4" height="48" fill="#3b82f6"/>
    <text x="404" y="86" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600" fill="#1e293b" text-anchor="middle">UnifiedResponseModel</text>
    <text x="404" y="100" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="#64748b" text-anchor="middle">统一响应包装</text>
    <text x="404" y="111" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="#64748b" text-anchor="middle">在 Router 层注入</text>
  </g>
  <!-- connector note -> Router -->
  <path d="M344 92 L326 92" stroke="#93c5fd" stroke-width="1.5" stroke-dasharray="4 3" fill="none"/>

  <!-- Router layer -->
  <g filter="url(#shadow)">
    <rect x="40" y="74" width="288" height="56" rx="10" fill="url(#router)"/>
    <text x="184" y="98" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#fff" text-anchor="middle">Router 层</text>
    <text x="184" y="116" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#dbeafe" text-anchor="middle">api/v1/xxx.py · 路由 · 参数校验 · 认证 · 响应包装</text>
  </g>

  <!-- Arrow Router -> Service -->
  <line x1="184" y1="130" x2="184" y2="156" stroke="#93c5fd" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arrowDown)"/>

  <!-- Service layer -->
  <g filter="url(#shadow)">
    <rect x="40" y="162" width="288" height="56" rx="10" fill="url(#service)"/>
    <text x="184" y="186" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#fff" text-anchor="middle">Service 层</text>
    <text x="184" y="204" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#d1fae5" text-anchor="middle">api/services/xxx.py · 业务逻辑编排 · 事务管理</text>
  </g>

  <!-- Arrow Service -> DAO -->
  <line x1="184" y1="218" x2="184" y2="244" stroke="#93c5fd" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arrowDown)"/>

  <!-- DAO layer -->
  <g filter="url(#shadow)">
    <rect x="40" y="250" width="288" height="56" rx="10" fill="url(#dao)"/>
    <text x="184" y="274" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#fff" text-anchor="middle">DAO 层</text>
    <text x="184" y="292" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#ede9fe" text-anchor="middle">database/dao/xxx.py · 数据库 CRUD · 单表封装</text>
  </g>

  <!-- Arrow DAO -> ORM Model -->
  <line x1="184" y1="306" x2="184" y2="326" stroke="#93c5fd" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arrowDown)"/>

  <!-- ORM Model + PostgreSQL -->
  <g filter="url(#shadow)">
    <rect x="40" y="330" width="144" height="40" rx="8" fill="#fff" stroke="#bfdbfe"/>
    <rect x="40" y="330" width="4" height="40" fill="#3b82f6"/>
    <text x="114" y="348" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#1e293b" text-anchor="middle">ORM Model</text>
    <text x="114" y="362" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="#64748b" text-anchor="middle">vibe_common/models/</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="196" y="330" width="132" height="40" rx="8" fill="#fff" stroke="#bfdbfe"/>
    <ellipse cx="216" cy="346" rx="10" ry="3.5" fill="none" stroke="#3b82f6" stroke-width="1.5"/>
    <path d="M206 346 L206 360 Q206 363.5 216 363.5 Q226 363.5 226 360 L226 346" fill="none" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="270" y="348" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#1e293b" text-anchor="middle">PostgreSQL</text>
    <text x="270" y="362" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="#64748b" text-anchor="middle">持久化存储</text>
  </g>
  <line x1="184" y1="350" x2="196" y2="350" stroke="#93c5fd" stroke-width="1.5" stroke-dasharray="4 3"/>
</svg>
