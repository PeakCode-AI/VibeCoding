<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 360" width="520" height="360">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#eff6ff"/>
      <stop offset="100%" stop-color="#dbeafe"/>
    </linearGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.1"/>
    </filter>
  </defs>

  <rect width="520" height="360" rx="16" fill="url(#bg)"/>

  <!-- Title -->
  <text x="260" y="34" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="700" fill="#1e293b" text-anchor="middle">四个入口，一套生意</text>
  <text x="260" y="52" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#64748b" text-anchor="middle">共享同一套后端 · 同一份用户与账本</text>

  <!-- Four client boxes -->
  <g filter="url(#shadow)">
    <!-- Web (blue) -->
    <rect x="26" y="74" width="104" height="72" rx="10" fill="#fff" stroke="#bfdbfe"/>
    <rect x="26" y="74" width="104" height="6" rx="3" fill="#3b82f6"/>
    <rect x="44" y="92" width="48" height="8" rx="2" fill="#bfdbfe"/>
    <rect x="44" y="104" width="34" height="6" rx="2" fill="#dbeafe"/>
    <text x="78" y="126" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#1e293b" text-anchor="middle">用户端</text>
    <text x="78" y="140" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#64748b" text-anchor="middle">VibeBase / Web</text>

    <!-- Admin (indigo) -->
    <rect x="148" y="74" width="104" height="72" rx="10" fill="#fff" stroke="#bfdbfe"/>
    <rect x="148" y="74" width="104" height="6" rx="3" fill="#6366f1"/>
    <rect x="166" y="90" width="20" height="20" rx="4" fill="#c7d2fe"/>
    <rect x="192" y="92" width="44" height="6" rx="2" fill="#bfdbfe"/>
    <rect x="192" y="103" width="30" height="6" rx="2" fill="#e0e7ff"/>
    <text x="200" y="126" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#1e293b" text-anchor="middle">运营后台</text>
    <text x="200" y="140" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#64748b" text-anchor="middle">VibeAdmin</text>

    <!-- App (green) -->
    <rect x="270" y="74" width="104" height="72" rx="10" fill="#fff" stroke="#bfdbfe"/>
    <rect x="270" y="74" width="104" height="6" rx="3" fill="#10b981"/>
    <rect x="316" y="90" width="16" height="26" rx="3" fill="none" stroke="#10b981" stroke-width="1.5"/>
    <circle cx="324" cy="112" r="1.5" fill="#10b981"/>
    <text x="322" y="126" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#1e293b" text-anchor="middle">移动 App</text>
    <text x="322" y="140" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#64748b" text-anchor="middle">VibeApp</text>

    <!-- Mini-program (amber) -->
    <rect x="392" y="74" width="104" height="72" rx="10" fill="#fff" stroke="#bfdbfe"/>
    <rect x="392" y="74" width="104" height="6" rx="3" fill="#f59e0b"/>
    <ellipse cx="444" cy="103" rx="12" ry="9" fill="none" stroke="#f59e0b" stroke-width="1.5"/>
    <ellipse cx="440" cy="103" rx="5" ry="9" fill="none" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="444" y="126" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#1e293b" text-anchor="middle">小程序 / H5</text>
    <text x="444" y="140" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#64748b" text-anchor="middle">Vibe-Mp-H5</text>
  </g>

  <!-- Connectors down to center -->
  <g stroke="#93c5fd" stroke-width="1.5" stroke-dasharray="4 3" fill="none">
    <path d="M78 146 L78 165 L260 165 L260 184"/>
    <path d="M200 146 L200 165 L260 165"/>
    <path d="M322 146 L322 165 L260 165"/>
    <path d="M444 146 L444 165 L260 165"/>
  </g>

  <!-- Central unified box -->
  <g filter="url(#shadow)">
    <rect x="100" y="184" width="320" height="64" rx="12" fill="url(#brand)"/>
    <text x="260" y="210" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="700" fill="#fff" text-anchor="middle">统一用户 · 统一账本 · 统一经营</text>
    <text x="260" y="230" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#dbeafe" text-anchor="middle">FastAPI 统一网关 · JWT 双 Token · 统一积分账本</text>
  </g>

  <!-- Connectors down to storage -->
  <g stroke="#93c5fd" stroke-width="1.5" stroke-dasharray="4 3" fill="none">
    <path d="M180 248 L180 278"/>
    <path d="M340 248 L340 278"/>
  </g>

  <!-- Storage layer -->
  <g filter="url(#shadow)">
    <!-- PostgreSQL -->
    <rect x="80" y="278" width="160" height="60" rx="10" fill="#fff" stroke="#bfdbfe"/>
    <ellipse cx="108" cy="300" rx="13" ry="4.5" fill="none" stroke="#3b82f6" stroke-width="1.5"/>
    <path d="M95 300 L95 320 Q95 324.5 108 324.5 Q121 324.5 121 320 L121 300" fill="none" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="170" y="304" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#1e293b">PostgreSQL</text>
    <text x="170" y="320" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#64748b">20+ 张共享数据表</text>

    <!-- Redis -->
    <rect x="280" y="278" width="160" height="60" rx="10" fill="#fff" stroke="#bfdbfe"/>
    <rect x="302" y="294" width="22" height="28" rx="3" fill="none" stroke="#dc2626" stroke-width="1.5"/>
    <line x1="306" y1="302" x2="320" y2="302" stroke="#dc2626" stroke-width="1.5"/>
    <line x1="306" y1="309" x2="320" y2="309" stroke="#dc2626" stroke-width="1.5"/>
    <line x1="306" y1="316" x2="320" y2="316" stroke="#dc2626" stroke-width="1.5"/>
    <text x="368" y="304" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#1e293b">Redis</text>
    <text x="368" y="320" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#64748b">限流 · Token 黑名单 · 缓存</text>
  </g>
</svg>
