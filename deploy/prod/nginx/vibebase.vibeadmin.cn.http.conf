# vibebase.vibeadmin.cn —— 阶段一：仅 HTTP，用于 Let's Encrypt webroot 验证
server
{
    listen 80;
    server_name vibebase.vibeadmin.cn;

    # ACME http-01 验证（certbot --webroot 写入此目录）
    location /.well-known/acme-challenge/ {
        root /opt/vibe/www/acme;
    }

    location / {
        default_type text/plain;
        return 200 "vibebase.vibeadmin.cn - provisioning HTTPS...\n";
    }
}
