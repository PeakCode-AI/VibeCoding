# =====================================================================
# vibebase.vibeadmin.cn —— 生产 Nginx 配置（宝塔 vhost）
#
# 路由总览（VibeBase 为主站占根路径，其余走上下文子路径）：
#   /            → VibeBase 主站      (vibebase-web   127.0.0.1:8091)
#   /api/        → VibeBase 后端 API  (vibebase-backend 127.0.0.1:18081，SSE)
#   /admin/      → VibeAdmin 后台前端 (vibeadmin-web  127.0.0.1:8090)
#   /admin/api/  → VibeAdmin 后端 API (vibeadmin-backend 127.0.0.1:18080，剥 /admin)
#   /h5/         → H5 静态站          (/opt/vibe/www/h5，SPA)
#   /docs/       → DOC 文档静态站      (/opt/vibe/www/docs，VitePress)
#
# 证书：certbot(Let's Encrypt)，自动续期指向 /etc/letsencrypt/live/...
# =====================================================================

# ---- HTTP：ACME 续期验证 + 强制 HTTPS ----
server
{
    listen 80;
    server_name vibebase.vibeadmin.cn;

    location /.well-known/acme-challenge/ {
        root /opt/vibe/www/acme;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ---- HTTPS 主站 ----
server
{
    listen 443 ssl;
    http2 on;
    server_name vibebase.vibeadmin.cn;

    ssl_certificate     /etc/letsencrypt/live/vibebase.vibeadmin.cn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/vibebase.vibeadmin.cn/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers EECDH+CHACHA20:EECDH+AES128:RSA+AES128:EECDH+AES256:RSA+AES256:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL_vibebase:10m;
    ssl_session_timeout 10m;
    add_header Strict-Transport-Security "max-age=31536000" always;

    client_max_body_size 20m;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_min_length 1000;

    # ---------- DOC 文档（静态，/docs/）----------
    location = /docs { return 301 /docs/; }
    location /docs/ {
        root /opt/vibe/www;
        index index.html;
        try_files $uri $uri/ $uri.html =404;
        add_header Cache-Control "no-cache";
    }
    location ~* ^/docs/.*\.(?:js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf)$ {
        root /opt/vibe/www;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ---------- H5（静态 SPA，/h5/）----------
    location = /h5 { return 301 /h5/; }
    location /h5/ {
        root /opt/vibe/www;
        index index.html;
        try_files $uri $uri/ /h5/index.html;
    }
    location ~* ^/h5/.*\.(?:js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf)$ {
        root /opt/vibe/www;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ---------- VibeAdmin 后端 API（/admin/api/ → 剥 /admin → :18080）----------
    # 注意：必须比 /admin/ 更长，Nginx 最长前缀匹配优先生效
    location /admin/api/ {
        proxy_pass http://127.0.0.1:18080/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # ---------- VibeAdmin 后台前端（/admin/ → :8090，容器内自行 rewrite 去 /admin）----------
    location = /admin { return 301 /admin/; }
    location /admin/ {
        proxy_pass http://127.0.0.1:8090;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ---------- VibeBase 后端 API（/api/ → :18081，SSE 必需关闭缓冲）----------
    location /api/ {
        proxy_pass http://127.0.0.1:18081;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # ★★★ SSE 流式对话必需 ★★★
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # ---------- VibeBase 主站（/ → :8091）----------
    location / {
        proxy_pass http://127.0.0.1:8091;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
