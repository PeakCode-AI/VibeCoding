# 生产环境 Docker Compose 编排（VibeAdmin + VibeBase + Redis + MinIO）
#
# 架构：宝塔 Nginx (80/443, www.vibeadmin.cn) 反代到本编排容器；后端容器仅绑定 127.0.0.1，
#       不对外暴露。容器经 host.docker.internal 连接服务器同机的宝塔 PostgreSQL。
#
# 使用方式（服务器仓库根目录 /opt/vibe）：
#   docker compose -f deploy/prod/docker-compose.prod.yml \
#     --env-file deploy/prod/.env.production up -d --build
#
# 端口（仅绑 127.0.0.1，对外由宝塔 Nginx 反代）：
#   vibeadmin-backend  127.0.0.1:8080    宝塔 /admin-api/ → 这里
#   vibebase-backend   127.0.0.1:8081    宝塔 /api/       → 这里
#   vibeadmin-web      127.0.0.1:8090    宝塔 /admin/     → 这里
#   vibebase-web       127.0.0.1:8091    宝塔 /           → 这里

services:
  # ---------- 中间件 ----------
  redis:
    image: redis:7-alpine
    container_name: vibe-prod-redis
    restart: unless-stopped
    networks: [vibe-prod]
    volumes:
      - vibe_prod_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: vibe-prod-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minioadmin}
    networks: [vibe-prod]
    ports:
      - "127.0.0.1:9001:9001"   # 控制台仅本机访问；S3 API 容器内部访问
    volumes:
      - vibe_prod_minio:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    networks: [vibe-prod]
    entrypoint: >
      /bin/sh -c "
        mc config host add minio http://minio:9000 ${S3_ACCESS_KEY:-minioadmin} ${S3_SECRET_KEY:-minioadmin} &&
        mc mb --ignore-existing minio/${S3_BUCKET:-vibe-storage} &&
        mc anonymous set public minio/${S3_BUCKET:-vibe-storage} &&
        echo 'MinIO bucket ready' && exit 0
      "

  # ---------- 后端（仅 127.0.0.1，宝塔反代）----------
  vibeadmin-backend:
    build:
      context: ../..
      dockerfile: VibeAdmin/vibe-admin/Dockerfile
    image: vibe-prod-admin-backend:latest
    container_name: vibe-prod-admin-backend
    restart: unless-stopped
    networks: [vibe-prod]
    ports:
      - "127.0.0.1:8080:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      ENVIRONMENT: production
      DATABASE_URL: postgresql+asyncpg://${DB_USER}:${DB_PASSWORD}@host.docker.internal:5432/${DB_NAME}
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY}
      BACKEND_CORS_ORIGINS: ${CORS_ORIGINS}
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_BUCKET: ${S3_BUCKET:-vibe-storage}
      SEED_DB_ON_STARTUP: "false"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 40s

  vibebase-backend:
    build:
      context: ../../VibeBase/vibe-base
      dockerfile: Dockerfile
    image: vibe-prod-base-backend:latest
    container_name: vibe-prod-base-backend
    restart: unless-stopped
    networks: [vibe-prod]
    ports:
      - "127.0.0.1:8081:8081"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      ENVIRONMENT: production
      DATABASE_URL: postgresql+asyncpg://${DB_USER}:${DB_PASSWORD}@host.docker.internal:5432/${DB_NAME}
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://dashscope.aliyuncs.com/compatible-mode/v1}
      OPENAI_MODEL: ${OPENAI_MODEL:-qwen-plus}
      VL_API_KEY: ${VL_API_KEY:-}
      VL_BASE_URL: ${VL_BASE_URL:-https://dashscope.aliyuncs.com/compatible-mode/v1}
      VL_MODEL: ${VL_MODEL:-qwen-vl-plus}
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_BUCKET: ${S3_BUCKET:-vibe-storage}
      # ---- VibePay 免签支付网关（https://pay.vibeadmin.cn/docs）----
      VIBEPAY_BASE_URL: ${VIBEPAY_BASE_URL:-https://pay.vibeadmin.cn}
      VIBEPAY_CORPORATE_ID: ${VIBEPAY_CORPORATE_ID:-}
      VIBEPAY_CORPORATE_SECRET: ${VIBEPAY_CORPORATE_SECRET:-}
      VIBEPAY_APP_ID: ${VIBEPAY_APP_ID:-}
      VIBEPAY_PUBLIC_BASE_URL: https://${PUBLIC_DOMAIN}
    depends_on:
      redis:
        condition: service_healthy
      vibeadmin-backend:
        condition: service_healthy   # Admin 先建表
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8081/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 40s

  # ---------- 前端（仅 127.0.0.1，宝塔反代）----------
  vibeadmin-web:
    build:
      context: ../../VibeAdmin/vibe-admin-web
      dockerfile: Dockerfile
      args:
        # 后台部署在 /admin/ 子路径；API 走 /admin/api/v1（宝塔反代到 vibeadmin-backend:8080）
        VITE_SERVER_API_URL: https://${PUBLIC_DOMAIN}/admin
        VITE_SERVER_API_PREFIX: /api/v1
        VITE_BASE: /admin/
    image: vibe-prod-admin-web:latest
    container_name: vibe-prod-admin-web
    restart: unless-stopped
    networks: [vibe-prod]
    ports:
      - "127.0.0.1:8090:80"
    depends_on:
      vibeadmin-backend:
        condition: service_healthy

  vibebase-web:
    build:
      context: ../../VibeBase/vibe-base-web
      dockerfile: Dockerfile
    image: vibe-prod-base-web:latest
    container_name: vibe-prod-base-web
    restart: unless-stopped
    networks: [vibe-prod]
    ports:
      - "127.0.0.1:8091:80"
    depends_on:
      vibebase-backend:
        condition: service_healthy

networks:
  vibe-prod:
    driver: bridge

volumes:
  vibe_prod_redis:
  vibe_prod_minio:
