# 中间件：PostgreSQL(5433) + Redis(6379)
#
# 用途：
#   - 两个后端（VibeBase / VibeAdmin）均使用 PostgreSQL（库 vibe / 用户
#     vibe / 密码 vibe）与 Redis，共享同一数据库实例。
#   - VibeAdmin 早期曾使用 SQLite，现已迁移到复用 vibe_common 的 PostgreSQL。
#
# 主机端口固定为 5433（避开 ServBay 自带的 PostgreSQL 5432，后者没有 vibe 库）。
# 容器内部仍是 5432，应用连接串统一写 localhost:5433 即可。

services:
  postgres:
    image: postgres:16-alpine
    container_name: vibe-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: vibe
      POSTGRES_USER: vibe
      POSTGRES_PASSWORD: vibe
    ports:
      - "5433:5432"
    volumes:
      - vibe_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vibe -d vibe"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: vibe-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - vibe_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: vibe-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - vibe_minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc config host add minio http://minio:9000 minioadmin minioadmin &&
        mc mb --ignore-existing minio/vibe-storage &&
        mc anonymous set public minio/vibe-storage &&
        echo 'MinIO bucket created and set to public' &&
        exit 0
      "

volumes:
  vibe_pg_data:
  vibe_redis_data:
  vibe_minio_data:
